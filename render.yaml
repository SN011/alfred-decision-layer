services:
  - type: web
    name: alfred-decision-layer
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: XAI_API_KEY
        sync: false
      - key: ALFRED_MODEL
        value: grok-4-1-fast-reasoning
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
